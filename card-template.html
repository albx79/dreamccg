<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream CCG Card Template</title>
    <style>
        @page {
            size: auto;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 10mm;
            background: #f0f0f0;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .card {
            width: 250px;
            height: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
        }
        .card-header {
            height: 25px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }
        .card-image {
            height: 200px;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-size: 12px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-abilities {
            height: 80px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.85);
            font-size: 11px;
            line-height: 1.3;
            overflow: hidden;
        }
        .card-stats {
            height: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 15px;
        }
        .stat-box {
            display: flex;
            align-items: center;
            gap: 0px;
        }
        .ap-cost {
            background: #ff9900;
            color: black;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .ability-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <!-- Card 1: Example -->
        <div class="card">
            <div class="card-header">
                <span>Dream Diver</span>
                <span class="ap-cost">2 AP</span>
            </div>
            <div class="card-image">
                <img src="https://via.placeholder.com/250x200/333333/FFFFFF?text=Unit+Image" alt="Unit Image">
            </div>
            <div class="card-abilities">
                <div class="ability-title">Abilities:</div>
                <div>• <strong>Lucid Movement:</strong> Can move downward for 1 AP.</div>
                <div>• <strong>Idea Carrier:</strong> May carry 1 Idea token.</div>
            </div>
            <div class="card-stats">
                <div class="stat-box">
                    <span>🔹</span>
                    <span>Move: 1</span>
                </div>
                <div class="stat-box">
                    <span>⚡</span>
                    <span>Power: 2</span>
                </div>
            </div>
        </div>

        <!-- Card 2: Blank Template -->
        <div class="card">
            <div class="card-header">
                <span>[CARD NAME]</span>
                <span class="ap-cost">[AP] AP</span>
            </div>
            <div class="card-image">
                <img src="https://via.placeholder.com/250x200/333333/FFFFFF?text=Insert+Image" alt="Insert Image">
            </div>
            <div class="card-abilities">
                <div class="ability-title">Abilities:</div>
                <div>• [Ability 1]</div>
                <div>• [Ability 2]</div>
            </div>
            <div class="card-stats">
                <div class="stat-box">
                    <span>🔹</span>
                    <span>Move: [X]</span>
                </div>
                <div class="stat-box">
                    <span>⚡</span>
                    <span>Power: [Y]</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
